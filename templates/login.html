{% extends 'base.html' %}

{% block title %}Login - CyberLab{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Welcome Back</h2>
            <p>Access your isolated lab environment</p>
        </div>
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-container">
                    <span class="input-icon">👤</span>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
                </div>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-container">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        </form>
        <div style="margin-top: 0.8rem; text-align: right;">
            <a href="{{ url_for('forgot_password') }}" class="cyber-link" style="font-size: 0.9rem;">Forgot password?</a>
        </div>
        <div class="auth-footer">
            <p>New to CyberLab? <a href="{{ url_for('register') }}">Create an account</a></p>
        </div>
    </div>
</div>
{% endblock %}
